<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>名古屋・鳥羽 ｜ 2026.11</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#6a3d2b;
  --ink-soft:#855440;
  --gold:#c2904a;
  --gold-soft:#ecdcbb;
  --persimmon:#d2622f;
  --sea:#3f7d6e;
  --sea-soft:#d2e4df;
  --paper:#f8f3e9;
  --card:#ffffff;
  --line:#e9e0cf;
  --text:#33291f;
  --muted:#978a78;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Noto Sans TC",system-ui,sans-serif;
  background:var(--paper);color:var(--text);
  line-height:1.55;-webkit-font-smoothing:antialiased;
}
.mono{font-family:"Space Mono",monospace}

/* ---------- shell ---------- */
.app{max-width:520px;margin:0 auto;min-height:100%;background:var(--paper);
  display:flex;flex-direction:column;position:relative}

/* ---------- masthead ---------- */
header.top{
  background:var(--paper);color:var(--text);padding:24px 20px 18px;
  padding-top:calc(22px + env(safe-area-inset-top));
  position:relative;overflow:hidden;text-align:center;
}
.leaf{position:absolute;font-size:34px;opacity:.16;filter:saturate(.7)}
.leaf-l{left:14px;top:14px;transform:rotate(-18deg)}
.leaf-r{right:14px;top:18px;transform:rotate(20deg)}
.eyebrow{font-size:12px;letter-spacing:.42em;color:var(--persimmon);font-weight:700;
  text-transform:uppercase;font-family:"Noto Serif TC",serif}
h1.title{font-family:"Noto Serif TC",serif;font-size:40px;font-weight:900;letter-spacing:.04em;
  margin:8px 0 0;line-height:1.12;color:#3a2a20}
.title2{font-family:"Noto Serif TC",serif;font-size:36px;font-weight:900;letter-spacing:.06em;
  margin:0 0 12px;line-height:1.12;color:#3a2a20}
.title2 .r7{color:#c0392b}
.subline{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 16px;
  font-size:12.5px;color:var(--ink-soft);font-weight:500}
.subline .mono{color:var(--text);font-weight:700}

/* ---------- tabs ---------- */
nav.tabs{display:flex;justify-content:center;gap:6px;background:var(--paper);
  padding:6px 12px 14px;position:sticky;top:0;z-index:500}
nav.tabs button{display:inline-flex;align-items:center;gap:7px;border:none;background:none;
  padding:8px 14px;border-radius:999px;font-family:inherit;font-size:14px;font-weight:700;
  color:var(--muted);cursor:pointer}
nav.tabs .tb{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;
  border-radius:50%;background:var(--gold-soft);color:var(--ink-soft);font-size:13px;
  font-family:"Noto Serif TC",serif;font-weight:700}
nav.tabs button.on{background:var(--ink);color:#fff}
nav.tabs button.on .tb{background:rgba(255,255,255,.9);color:var(--ink)}

main{flex:1;padding:18px 16px 90px}
.view{display:none}.view.on{display:block}

/* ---------- day header ---------- */
.day{padding-bottom:6px}
.dhead{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.daybadge{flex-shrink:0;width:52px;height:52px;border-radius:13px;color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(20,30,50,.12)}
.daybadge b{font-family:"Noto Serif TC",serif;font-size:23px;font-weight:900;line-height:1}
.daybadge span{font-size:8.5px;letter-spacing:.18em;margin-top:2px;opacity:.92;font-weight:700}
.dmain{flex:1;min-width:0;padding-top:3px}
.drow{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.drow .ddate{font-family:"Space Mono",monospace;font-weight:700;font-size:15px;color:var(--ink-soft)}
.drow .ddow{font-size:11px;color:var(--ink-soft);border:1px solid var(--line);background:#fff;
  padding:1px 7px;border-radius:6px;font-weight:700}
.dtitle{font-family:"Noto Serif TC",serif;font-weight:900;font-size:20px;color:#3a2a20;line-height:1.25}

.card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:6px 4px;margin-bottom:18px;box-shadow:0 1px 2px rgba(20,30,50,.03)}

/* fixed events */
.fixed{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border-bottom:1px dashed var(--line)}
.fixed:last-child{border-bottom:none}
.fixed .ft{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;color:var(--ink-soft);
  min-width:54px;padding-top:1px}
.fixed .fi{width:22px;text-align:center;font-size:14px;flex-shrink:0}
.fixed .fx{font-size:13.5px;line-height:1.45}
.fixed.lock .fx::after{content:" 🔒";font-size:9px;opacity:.35}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:5px;vertical-align:1px}
.tag.fly{background:#fdeee6;color:var(--persimmon)}
.tag.bed{background:#eef4f1;color:var(--sea)}
.tag.move{background:#f1eef7;color:#6b5aa0}

.booking{display:flex;align-items:center;gap:6px;margin:8px 10px 2px;padding:9px 12px;
  background:#fff4ee;border:1px solid #ffd6c2;border-radius:10px;color:#e8540a;
  font-weight:700;font-size:12.5px;text-decoration:none;line-height:1.4}
.booking:active{background:#ffe7da}
.bookinfo{font-size:11.5px;color:var(--ink-soft);margin:5px 12px 8px;line-height:1.55;
  padding-left:10px;border-left:2px solid #ffd6c2}

.grp{border-left:3px solid var(--line);padding-left:11px;margin:4px 8px}
.grp.g1{border-color:#6b5aa0}
.grp.g2{border-color:#c2557e}
.grphead{font-weight:700;font-size:14px;color:var(--ink);margin:10px 0 2px;display:flex;gap:7px;align-items:baseline;flex-wrap:wrap}
.grphead .gs{font-size:11px;color:var(--muted);font-weight:500}
.grpdiv{height:1px;background:var(--line);margin:12px 10px 4px}
.meet{display:flex;gap:8px;align-items:center;padding:11px 12px;margin:10px 8px 4px;
  background:#faf5ea;border:1px solid var(--line);border-radius:10px;font-size:13px;color:var(--ink-soft);font-weight:500}

/* editable activities */
.acts{padding:4px 8px 8px}
.act{display:flex;gap:9px;align-items:flex-start;padding:7px 4px;border-bottom:1px solid #f3eee3}
.act:last-child{border-bottom:none}
.act .at{font-family:"Space Mono",monospace;font-size:12px;color:var(--muted);min-width:46px;
  border:none;background:none;padding:2px 0;width:46px}
.act .an{flex:1;border:none;background:none;font-family:inherit;font-size:14px;color:var(--text);padding:2px 0}
.act .at:focus,.act .an:focus{outline:none;border-bottom:1.5px solid var(--gold)}
.act .del{border:none;background:none;color:#c7ccd4;font-size:16px;cursor:pointer;padding:0 4px;line-height:1}
.act .del:hover{color:var(--persimmon)}
.act.empty{color:var(--muted);font-style:italic;font-size:13px;padding-left:6px}

.gmap{flex-shrink:0;text-decoration:none;font-size:13px;width:26px;height:26px;border-radius:7px;
  display:inline-flex;align-items:center;justify-content:center;background:#eef1f6;line-height:1}
.gmap:active{background:var(--gold-soft)}
.pop-g{display:inline-block;margin-top:7px;font-size:12px;font-weight:700;color:#1a73e8;text-decoration:none}

.addrow{display:flex;flex-wrap:wrap;gap:6px;padding:6px 8px 10px;align-items:center}
.addbtn{border:1px dashed var(--gold);background:#fff;color:var(--ink-soft);font-family:inherit;
  font-weight:700;font-size:12.5px;padding:6px 12px;border-radius:8px;cursor:pointer}
.addbtn:active{background:#faf5ea}
.chip{border:1px solid var(--line);background:#faf7f0;color:var(--ink-soft);font-size:11.5px;
  padding:5px 10px;border-radius:999px;cursor:pointer;font-family:inherit}
.chip:active{background:var(--gold-soft)}
.chiphint{font-size:11px;color:var(--muted);width:100%;margin-bottom:1px}

/* ---------- map ---------- */
#map{height:62vh;min-height:340px;border-radius:14px;border:1px solid var(--line);overflow:hidden}
.legend{display:flex;gap:16px;margin:12px 2px 4px;font-size:12px;color:var(--ink-soft);flex-wrap:wrap}
.legend i{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:0px}
.maphint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
.daypills{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 10px;-webkit-overflow-scrolling:touch}
.daypills::-webkit-scrollbar{display:none}
.pill{flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);
  background:#fff;color:var(--ink-soft);font-family:inherit;font-size:12.5px;font-weight:700;
  padding:6px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}
.pill i{width:9px;height:9px;border-radius:50%;display:inline-block}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.leaflet-popup-content{font-family:"Noto Sans TC",sans-serif;margin:11px 13px}
.pop-t{font-weight:700;font-size:14px;color:var(--ink)}
.pop-s{font-size:12px;color:var(--muted);margin-top:2px}

/* ---------- budget ---------- */
.conv{background:#fbf4e4;color:var(--text);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:16px}
.conv .lbl{font-size:11px;color:var(--ink-soft);letter-spacing:.14em;font-weight:700}
.conv .row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.conv input{font-family:"Space Mono",monospace;font-size:16px;font-weight:700;border:1px solid var(--line);
  border-radius:8px;padding:8px 10px;width:96px;text-align:right;background:#fff;color:var(--text)}
.conv .yen{background:#fff;color:var(--text)}
.conv .eq{font-size:14px;color:var(--muted)}
.conv .ntd{background:#fff;color:var(--ink)}
.conv .rate{font-size:11px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:6px}
.conv .rate input{width:62px;padding:3px 6px;font-size:12px;text-align:center}

.budtotal{display:flex;justify-content:space-between;align-items:baseline;
  padding:0 4px 10px;border-bottom:2px solid var(--ink);margin-bottom:6px}
.budtotal .bl{font-size:13px;font-weight:700;color:var(--ink)}
.budtotal .bv{font-family:"Space Mono",monospace;font-size:24px;font-weight:700;color:var(--ink)}
.budtotal .bv small{font-size:13px;color:var(--muted)}

.bars{margin:12px 4px 18px;display:flex;flex-direction:column;gap:7px}
.bar{display:flex;align-items:center;gap:8px;font-size:12px}
.bar .bn{width:64px;color:var(--ink-soft);font-weight:500}
.bar .bt{flex:1;height:8px;background:#efe9dc;border-radius:6px;overflow:hidden}
.bar .bf{height:100%;border-radius:6px}
.bar .bm{font-family:"Space Mono",monospace;color:var(--muted);min-width:52px;text-align:right}

.exp{padding:10px 6px;border-bottom:1px solid #f1ece0}
.exp .r1{display:flex;align-items:center;gap:8px}
.exp .r2{display:flex;align-items:center;gap:8px;margin-top:8px;padding-left:1px}
.exp select{border:none;border-radius:7px;font-family:inherit;font-size:11.5px;font-weight:700;
  padding:5px 6px;color:#fff;width:64px;-webkit-appearance:none;appearance:none;text-align:center}
.exp select.who{width:58px}
.exp .en{flex:1;border:none;background:none;font-family:inherit;font-size:14px;padding:3px 0}
.exp .ea{font-family:"Space Mono",monospace;font-size:15px;border:none;background:none;width:90px;
  text-align:right;padding:3px 0}
.exp input:focus,.exp select:focus{outline:none}
.exp .ea:focus{border-bottom:1.5px solid var(--gold)}
.exp .paylbl{font-size:11px;color:var(--muted);margin-left:auto}
.exp .del{border:none;background:none;color:#c7ccd4;font-size:18px;cursor:pointer;padding:0 2px}
.exp .del:hover{color:var(--persimmon)}

.payers{margin:8px 4px 16px;background:#fbf7ee;border:1px solid var(--line);border-radius:12px;padding:11px 12px}
.payers .psumhead{font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:9px}
.payers .pchips{display:flex;flex-wrap:wrap;gap:7px}
.payers .pchip{display:inline-flex;align-items:baseline;gap:5px;border-radius:8px;padding:5px 11px;
  font-size:12px;font-weight:700;color:#fff}
.payers .pchip .pv{font-family:"Space Mono",monospace;font-size:12px}
.expadd{margin:12px 4px;width:calc(100% - 8px);border:1px dashed var(--gold);background:#fff;
  color:var(--ink-soft);font-family:inherit;font-weight:700;font-size:13px;padding:10px;border-radius:10px;cursor:pointer}

/* ---------- food ---------- */
.foodhead{display:flex;justify-content:space-between;align-items:baseline;
  padding:0 4px 10px;border-bottom:2px solid var(--ink);margin-bottom:14px}
.foodhead span:first-child{font-size:13px;font-weight:700;color:var(--ink)}
.foodprog{font-size:13px;color:var(--persimmon);font-weight:700}
.fgroup{margin-bottom:20px}
.fgroup .fgt{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;
  letter-spacing:.06em;color:#fff;padding:4px 11px;border-radius:7px;margin-bottom:10px;width:fit-content}
.fgroup.nagoya .fgt{background:var(--gold)}
.fgroup.toba .fgt{background:var(--sea)}
.fitem{display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid #f1ece0}
.fitem:last-of-type{border-bottom:none}
.fcheck{width:21px;height:21px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;
  transition:background .15s,border-color .15s}
.fitem.done .fcheck{background:var(--sea);border-color:var(--sea)}
.fgroup.nagoya .fitem.done .fcheck{background:var(--gold);border-color:var(--gold)}
.fname{flex:1;border:none;background:none;font-family:inherit;font-size:14.5px;color:var(--text);padding:3px 0}
.fname:focus{outline:none;border-bottom:1.5px solid var(--gold)}
.fitem.done .fname{color:var(--muted);text-decoration:line-through}
.fitem .del{border:none;background:none;color:#c7ccd4;font-size:16px;cursor:pointer;padding:0 2px}
.fitem .del:hover{color:var(--persimmon)}
.faddrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;align-items:center}
.faddbtn{border:1px dashed currentColor;background:#fff;font-family:inherit;font-weight:700;
  font-size:12.5px;padding:6px 12px;border-radius:8px;cursor:pointer}
.fgroup.nagoya .faddbtn{color:var(--gold)}
.fgroup.toba .faddbtn{color:var(--sea)}

footer{padding:14px 16px 30px;text-align:center;color:var(--muted);font-size:11px}
.savedot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--sea);margin-right:5px;
  opacity:0;transition:opacity .2s}
.savedot.show{opacity:1}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <span class="leaf leaf-l">🍁</span><span class="leaf leaf-r">🍁</span>
    <div class="eyebrow">NAGOYA · MIE</div>
    <h1 class="title">名古屋 ・ 三重</h1>
    <h2 class="title2"><span class="r7">7</span>日家族旅行</h2>
    <div class="subline">
      <span>🗓️ <b class="mono">2026/11/15</b> 日 — <b class="mono">11/21</b> 六</span>
      <span>👨‍👩‍👧‍👧 四人家庭</span>
      <span>🎴 住宿換一次（名古屋 → 三重）</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="on" data-tab="trip"><span class="tb">行</span>行程</button>
    <button data-tab="map"><span class="tb">地</span>地圖</button>
    <button data-tab="budget"><span class="tb">費</span>預算</button>
    <button data-tab="food"><span class="tb">食</span>美食</button>
  </nav>

  <main>
    <section class="view on" id="view-trip"></section>

    <section class="view" id="view-map">
      <div class="daypills" id="daypills"></div>
      <div id="map"></div>
      <p class="maphint">上方依天數篩選。點任一景點看詳情,再點「在 Google 地圖開啟」即可導航。</p>
    </section>

    <section class="view" id="view-budget">
      <div class="conv">
        <div class="lbl">日幣換算</div>
        <div class="row">
          <input class="yen mono" id="yen" type="number" inputmode="numeric" placeholder="10000">
          <span class="eq">日圓 ＝</span>
          <input class="ntd mono" id="ntd" type="number" readonly>
          <span class="eq">台幣</span>
        </div>
        <div class="rate">匯率 1 日圓 ＝ <input class="mono" id="rate" type="number" step="0.001" value="0.215"> 台幣（可改）</div>
      </div>

      <div class="budtotal">
        <span class="bl">預算合計</span>
        <span class="bv">NT$ <span id="budtotal">0</span></span>
      </div>
      <div class="bars" id="bars"></div>
      <div class="payers" id="payers"></div>

      <div id="explist"></div>
      <button class="expadd" id="expadd">＋ 新增一筆花費</button>
    </section>

    <section class="view" id="view-food">
      <div class="foodhead">
        <span>想吃清單</span>
        <span class="foodprog mono" id="foodprog">0 / 0</span>
      </div>
      <div id="foodlist"></div>
    </section>
  </main>

  <footer>
    <span class="savedot" id="savedot"></span><span id="savetxt">編輯會自動保存於這個裝置</span>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

      {key:"11/17#姊妹", label:"👭 姊妹組", sub:"名古屋市區自由行", area:"nagoya", links:[]}
    ]},
  { date:"11/18", dow:"三", dnum:"DAY 4", area:"nagoya", theme:"🍁 香嵐溪 賞楓",

function renderActs(date){
  var box=document.querySelector('[data-acts="'+date+'"]'); if(!box) return;
  var list=actsFor(date); box.innerHTML="";
  if(list.length===0){ box.innerHTML='<div class="act empty">尚未安排,點下方按鈕或推薦標籤加入</div>'; return; }
  list.forEach(function(a){
    var row=document.createElement("div"); row.className="act";
    row.innerHTML=
      '<input class="at" value="'+escAttr(a.t)+'" placeholder="時間" maxlength="7">'+
      '<input class="an" value="'+escAttr(a.n)+'" placeholder="要去哪 / 做什麼">'+
      '<a class="gmap" target="_blank" rel="noopener" title="Google 地圖">📍</a>'+
      '<button class="del" title="刪除">×</button>';
    var at=row.querySelector(".at"), an=row.querySelector(".an"), gm=row.querySelector(".gmap");
    function syncGm(){ var q=(a.n||"").trim(); if(q){gm.style.display="";gm.href=gmap(q+" 日本");} else {gm.style.display="none";} }
    at.addEventListener("input",function(e){a.t=e.target.value;save();});
    at.addEventListener("change",function(){ sortByTime(date); });   // re-sort when you leave the time box
    an.addEventListener("input",function(e){a.n=e.target.value;syncGm();save();});
    row.querySelector(".del").addEventListener("click",function(){
      var i=list.indexOf(a); if(i>-1) list.splice(i,1); save(); renderActs(date);
    });
    syncGm();
    box.appendChild(row);
  });
}

function parseTime(t){
  if(!t) return null;
  var m=String(t).match(/(\d{1,2})\s*[:：.]?\s*(\d{2})/);
  if(!m) return null;
  var h=parseInt(m[1],10), mi=parseInt(m[2],10);
  if(h>23||mi>59) return null;
  return h*60+mi;
}
function sortByTime(date){
  var list=actsFor(date);
  list.forEach(function(a,i){a._i=i;});
  list.sort(function(a,b){
    var ta=parseTime(a.t), tb=parseTime(b.t);
    if(ta==null && tb==null) return a._i-b._i;
    if(ta==null) return 1;
    if(tb==null) return -1;
    if(ta!==tb) return ta-tb;
    return a._i-b._i;
  });
  list.forEach(function(a){ delete a._i; });
  save(); renderActs(date);
}
function escAttr(s){return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}
function gmap(q){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q);}

function bindTrip(){
  document.querySelectorAll("[data-newact]").forEach(function(b){
    b.addEventListener("click",function(){
      var date=b.getAttribute("data-newact");
      actsFor(date).push({t:"",n:""}); save(); renderActs(date);
      var box=document.querySelector('[data-acts="'+date+'"]');
      var ins=box.querySelectorAll(".an"); if(ins.length) ins[ins.length-1].focus();
    });
  });
  document.querySelectorAll("[data-add]").forEach(function(b){
    b.addEventListener("click",function(){
      var date=b.getAttribute("data-add"); var name=b.getAttribute("data-name");
      actsFor(date).push({t:"",n:name}); save(); renderActs(date);
    });
  });
}

var map=null, mapMarkers=[], currentDay=null;

function dayPin(p){
  var c=DAYCOLORS[p.day]||"#888";
  var html='<div style="background:'+c+';width:26px;height:26px;border-radius:50% 50% 50% 0;'+
    'transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.45);'+
    'display:flex;align-items:center;justify-content:center;">'+
    '<span style="transform:rotate(45deg);color:#fff;font-weight:700;font-size:12px;font-family:monospace;">'+p.day+'</span></div>';
  return L.divIcon({html:html, className:"", iconSize:[26,26], iconAnchor:[13,25], popupAnchor:[0,-23]});
}

function buildPills(){
  var host=document.getElementById("daypills"); if(!host) return;
  host.innerHTML="";
  var defs=[{k:null,label:"全部"}];
  for(var i=1;i<=7;i++) defs.push({k:i,label:"Day "+i});
  defs.forEach(function(d){
    var b=document.createElement("button");
    b.className="pill"+(d.k===currentDay?" on":"");
    b.innerHTML=(d.k!=null?'<i style="background:'+DAYCOLORS[d.k]+'"></i>':"")+d.label;
    b.addEventListener("click",function(){ currentDay=d.k; buildPills(); filterDay(); });
    host.appendChild(b);
  });
}
function filterDay(){
  var shown=[];
  mapMarkers.forEach(function(o){
    var on=(currentDay==null || o.day===currentDay);
    if(on){ o.marker.addTo(map); shown.push([o.lat,o.lng]); }
    else map.removeLayer(o.marker);
  });
  if(shown.length){ map.fitBounds(shown,{padding:[40,40], maxZoom:13}); }
}

function initMap(){
  if(map){ map.invalidateSize(); return; }
  map=L.map("map",{scrollWheelZoom:false}).setView([35.2,136.9],8);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{
    attribution:"&copy; OpenStreetMap &copy; CARTO", subdomains:"abcd", maxZoom:20}).addTo(map);
  mapMarkers=[];
  PLACES.forEach(function(p){
    var m=L.marker([p.lat,p.lng],{icon:dayPin(p)});
    m.bindPopup('<div class="pop-t">'+p.n+'</div><div class="pop-s">Day '+p.day+' ・ '+p.s+'</div>'+
      '<a class="pop-g" target="_blank" rel="noopener" href="'+gmap(p.n+" 日本")+'">在 Google 地圖開啟 →</a>');
    mapMarkers.push({marker:m, day:p.day, lat:p.lat, lng:p.lng});
  });
  buildPills();
  filterDay();
  setTimeout(function(){map.invalidateSize(); filterDay();},200);
}

  mem.budget.forEach(function(e){
    var a=e.amt||0; if(!a) return;
    if(ppl[e.who]!=null) ppl[e.who]+=a;
  });
  host.innerHTML='<div class="psumhead">每人花費小計</div>'+
    '<div class="pchips">'+Object.keys(ppl).map(function(p){
      return '<span class="pchip" style="background:'+WHOCOLOR[p]+'">'+p+
        ' <span class="pv">'+Math.round(ppl[p]).toLocaleString()+'</span></span>';
    }).join("")+'</div>';
}
function renderTotal(){
  var t=mem.budget.reduce(function(s,e){return s+(e.amt||0);},0);
  document.getElementById("budtotal").textContent=t.toLocaleString();
}
function renderBars(){
  var byCat={}; mem.budget.forEach(function(e){byCat[e.cat]=(byCat[e.cat]||0)+(e.amt||0);});
  var total=mem.budget.reduce(function(s,e){return s+(e.amt||0);},0)||1;
  var host=document.getElementById("bars"); host.innerHTML="";
  CATS.forEach(function(c){
    var v=byCat[c]||0; if(v===0) return;
    var pct=Math.round(v/total*100);
    var row=document.createElement("div"); row.className="bar";
    row.innerHTML='<span class="bn">'+c+'</span>'+
      '<span class="bt"><span class="bf" style="width:'+pct+'%;background:'+CATCOLOR[c]+'"></span></span>'+
      '<span class="bm">'+v.toLocaleString()+'</span>';
    host.appendChild(row);
  });
}
/* ============ food ============ */
function renderFood(){
  var host=document.getElementById("foodlist"); host.innerHTML="";
  FOODGROUPS.forEach(function(g){
    var items=mem.foods.filter(function(f){return f.g===g.key;});
    var grp=document.createElement("div"); grp.className="fgroup "+g.key;
    grp.innerHTML='<div class="fgt">'+g.label+'</div>';
    items.forEach(function(f){
      var realIdx=mem.foods.indexOf(f);
      var row=document.createElement("div"); row.className="fitem"+(f.done?" done":"");
      row.innerHTML='<div class="fcheck">'+(f.done?"✓":"")+'</div>'+
        '<input class="fname" value="'+escAttr(f.n)+'" placeholder="想吃的店 / 菜">'+
        '<a class="gmap" target="_blank" rel="noopener" title="Google 地圖">📍</a>'+
        '<button class="del">×</button>';
      var region = g.key==="nagoya" ? "名古屋" : "伊勢 三重";
      var fn=row.querySelector(".fname"), gm=row.querySelector(".gmap");
      function syncGm(){ var q=(f.n||"").trim(); if(q){gm.style.display="";gm.href=gmap(q+" "+region);} else {gm.style.display="none";} }
      row.querySelector(".fcheck").addEventListener("click",function(){ f.done=!f.done; save(); renderFood(); });
      fn.addEventListener("input",function(e){f.n=e.target.value;syncGm();save();});
      row.querySelector(".del").addEventListener("click",function(){ mem.foods.splice(realIdx,1); save(); renderFood(); });
      syncGm();
      grp.appendChild(row);
    });
    var add=document.createElement("div"); add.className="faddrow";
    add.innerHTML='<button class="faddbtn">＋ 自己加</button>'+
      g.chips.map(function(c){return '<button class="chip" data-fc="'+escAttr(c)+'" data-fg="'+g.key+'">'+c+'</button>';}).join("");
    add.querySelector(".faddbtn").addEventListener("click",function(){
      mem.foods.push({g:g.key,n:"",done:false}); save(); renderFood();
      var ins=document.querySelectorAll(".fgroup."+g.key+" .fname");
      if(ins.length) ins[ins.length-1].focus();
    });
    add.querySelectorAll("[data-fc]").forEach(function(b){
      b.addEventListener("click",function(){
        mem.foods.push({g:b.getAttribute("data-fg"),n:b.getAttribute("data-fc"),done:false});
        save(); renderFood();
      });
    });
    grp.appendChild(add);
    host.appendChild(grp);
  });
  var total=mem.foods.length, done=mem.foods.filter(function(f){return f.done;}).length;
  document.getElementById("foodprog").textContent="已吃 "+done+" / "+total;
}

function setupBudget(){
  document.getElementById("expadd").addEventListener("click",function(){
    mem.budget.push({cat:"餐飲",name:"",amt:0,who:"爸"}); save(); renderBudget();
    var ins=document.querySelectorAll("#explist .en"); if(ins.length) ins[ins.length-1].focus();
  });
  var yen=document.getElementById("yen"), ntd=document.getElementById("ntd"), rate=document.getElementById("rate");
  function conv(){ var v=parseFloat(yen.value)||0; ntd.value=Math.round(v*mem.rate); }
  yen.addEventListener("input",conv);
  rate.addEventListener("input",function(){ mem.rate=parseFloat(rate.value)||0; save(); conv(); });
}

/* ============ tabs ============ */
function setupTabs(){
  document.querySelectorAll("nav.tabs button").forEach(function(b){
    b.addEventListener("click",function(){
      document.querySelectorAll("nav.tabs button").forEach(function(x){x.classList.remove("on");});
      document.querySelectorAll(".view").forEach(function(x){x.classList.remove("on");});
      b.classList.add("on");
      var t=b.getAttribute("data-tab");
      document.getElementById("view-"+t).classList.add("on");
      if(t==="map") initMap();
      if(t==="food") renderFood();
      window.scrollTo(0,0);
    });
  });
}

/* ============ countdown ============ */
function countdown(){
  var el=document.getElementById("cd"); if(!el) return;
  var dep=new Date(2026,10,15,14,55,0);
  var now=new Date();
  var d=Math.ceil((dep-now)/86400000);
  el.textContent = d>0? d : (d===0?"0":"已出發");
}

/* ============ boot ============ */
(async function(){
  await loadStore();
  if(!hasStore){
    document.getElementById("savetxt").textContent="提示:此環境無法保存,編輯重整後會消失";
  }
  countdown();
  renderTrip();
  setupTabs();
  setupBudget();
  renderBudget();
  renderFood();
})();
</script>
</body>
</html>
